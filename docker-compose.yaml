name: ping

services:
  web:
    build: .
    command: gunicorn ping.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "8000:8000" 

  daphne:
    build: .
    command: daphne -b 0.0.0.0 -p 8001 ping.asgi:application
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "8001:8001"

  redis:
    image: redis:7
    volumes:
      - redis_data:/data

volumes:
  redis_data: