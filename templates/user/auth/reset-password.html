{% extends 'user/auth/base.html' %}
{% block content %}

  <div class="d-flex align-items-center gap-3 mb-4">
    <div class="bg-primary bg-opacity-10 p-2 rounded-3">
      <i class="bi bi-key-fill fs-4" style="color: #667eea;"></i>
    </div>
    <div>
      <h2 class="h4 mb-0 fw-semibold" style="color: #1e293b;">Reset password</h2>
      <p class="text-muted small mb-0">Enter your new password</p>
    </div>
  </div>

  <!-- Reset Form -->
  <form id="resetForm" method="POST">
    {% csrf_token %}
    <div class="mb-4">
      <label class="form-label"><i class="bi bi-envelope-fill"></i> Password</label>
      <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
    </div>

    <div class="mb-4">
      <label class="form-label"><i class="bi bi-envelope-fill"></i> Confirm Password</label>
      <input type="password" class="form-control" id="confirmPassword" name="confirm_password" placeholder="" required>
    </div>

    <button type="submit" class="btn btn-primary w-100 rounded-pill shadow-sm">
      <i class="bi bi-send me-2"></i> Reset Password
    </button>

    <div class="text-center mt-4 pt-2">
      <p class="mb-0 text-muted small">
        <a href="{% url 'login_user' %}" id="backToLoginLink" class="fw-semibold">← Back to sign in</a>
      </p>
    </div>
  </form>

{% endblock content %}
