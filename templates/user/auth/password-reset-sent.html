<div class="d-flex justify-content-center mb-4">
  <div class="bg-primary bg-opacity-10 p-3 rounded-3">
    <i class="bi bi-envelope-check-fill fs-1" style="color: #667eea;"></i>
  </div>
</div>

<h2 class="h4 mb-2 fw-semibold">Check your inbox</h2>
<p class="text-muted mb-4">
  We've sent a password reset link to <strong id="emailDisplay" class="fw-semibold">your email</strong>.<br>
  Click the link to create a new password.
</p>

<div class="alert alert-success-custom d-flex align-items-center gap-2 mb-4" style="background: #e6f9ed; border-radius: 20px; border: none; color: #0a5c2e;">
  <i class="bi bi-clock-history"></i>
  <span class="small">The link expires in 10 minutes.</span>
</div>

<a href="{% url 'login_user' %}" class="btn btn-primary w-100 rounded-pill shadow-sm">
  <i class="bi bi-arrow-left me-2"></i> Back to sign in
</a>
