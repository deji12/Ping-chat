{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 col-md-10">
        <div class="settings-card p-4 p-md-5">

            <!-- Header with icon -->
            <div class="d-flex align-items-center gap-3 mb-4">
                <div class="bg-primary bg-opacity-10 p-2 rounded-3">
                    <i class="bi bi-gear-wide-connected fs-3" style="color: #667eea;"></i>
                </div>
                <div>
                    <h2 class="h4 mb-0 fw-semibold">Profile settings</h2>
                    <p class="text-muted small mb-0">Manage your account information</p>
                </div>
            </div>

            <!-- Settings Form -->
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <!-- Profile Picture Section -->
                <div class="text-center mb-4">
                    <div class="avatar-upload d-inline-block position-relative">
                        <img id="avatarImg" class="avatar-preview mb-2"
                            src="{{request.user.get_profile_image}}"
                            alt="Profile picture">
                        <div class="mt-2">
                            <label class="btn btn-outline-secondary btn-sm rounded-pill">
                                <i class="bi bi-camera me-1"></i> Change photo
                                <input type="file" id="avatarInput" accept="image/*" name="profile_image" style="display: none;">
                            </label>
                        </div>
                    </div>
                </div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-person"></i> First name</label>
                        <input type="text" class="form-control" placeholder="John" name="first_name" value="{{request.user.first_name|default:''}}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-person-badge"></i> Last name</label>
                        <input type="text" class="form-control" placeholder="Doe" name="last_name" value="{{request.user.last_name|default:''}}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-at"></i> Username</label>
                        <input type="text" class="form-control" placeholder="johndoe" name="username" value="{{request.user.username|default:''}}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-envelope-fill"></i> Email</label>
                        <input type="email" class="form-control" placeholder="hello@ping.com" name="email" 
                            value="{{request.user.email|default:''}}" required>
                    </div>
                </div>

                <div class="mt-3">
                    <label class="form-label"><i class="bi bi-chat-text-fill"></i> Bio</label>
                    <textarea class="form-control" rows="3"
                        placeholder="Tell something about yourself..." name="bio">{{request.user.bio|default:''}}</textarea>
                    <div class="form-text text-muted">Short bio (max 160 characters)</div>
                </div>

                <hr class="my-4">
                <h5 class="fw-semibold mb-3"><i class="bi bi-lock-fill me-2" style="color:#667eea;"></i> Change
                    password</h5>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label"><i class="bi bi-key"></i> Current password</label>
                        <input type="password" class="form-control" placeholder="••••••••" name="current_password">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label"><i class="bi bi-pencil"></i> New password</label>
                        <input type="password" class="form-control" placeholder="min. 6 characters" name="new_password">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label"><i class="bi bi-check-lg"></i> Confirm new</label>
                        <input type="password" class="form-control" placeholder="confirm" name="confirm_new_password">
                    </div>
                </div>

                <div class="d-flex flex-wrap justify-content-end gap-3 mt-4 pt-2">
                    <button type="reset" class="btn btn-outline-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary px-4">Save changes <i
                            class="bi bi-check2 ms-2"></i></button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
